<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Validate Certificate | Civil Registration</title>
<link rel="icon" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:url("2.png") repeat;
}

/* ================= LOADER ================= */

#page-loader{
position:fixed;
inset:0;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .5s ease, visibility .5s ease;
}

#page-loader.hide{
opacity:0;
visibility:hidden;
}

.loader-wrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.loader-logo{
width:60px;
}

.loader-ring{
width:40px;
height:40px;
border:4px solid #ddd;
border-top:4px solid #1f4e79;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* ================= HEADER ================= */

/* HEADER */

header{
position:relative;
}

/* FLAG LAYER */

.flag-layer{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:0;
}

.flag-left{
height:60px;
}

.flag-right{
height:60px;
}

/* MAIN HEADER */

.top-strip{
background:#f39c3d;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

/* LEFT SIDE */

.header-left{
display:flex;
align-items:center;
gap:12px;
flex:1;
}

.crs-logo{
height:50px;
}

.title-area{
line-height:1.2;
}

.title-area h1{
font-size:22px;
margin:0;
}

.title-area p{
font-size:12px;
margin:0;
}

.azadi-banner{
height:40px;
margin-left:10px;
}

/* CENTER EMBLEM */

.header-center{
flex:1;
text-align:center;
}

.emblem{
height:70px;
opacity:0.5;
}

/* RIGHT SIDE */

.header-right{
flex:1;
display:flex;
justify-content:flex-end;
align-items:center;
gap:8px;
}

.tool{
border:1px solid #ccc;
padding:4px 8px;
background:white;
border-radius:4px;
font-size:13px;
cursor:pointer;
}

.login{
background:#1f4e79;
color:white;
border:none;
padding:6px 14px;
border-radius:4px;
cursor:pointer;
}

.menu-icon{
font-size:20px;
cursor:pointer;
}

/* ================= NAVIGATION ================= */

.nav-bar{
background:#1f4e79;
display:flex;
justify-content:center;
}

.menu{
list-style:none;
display:flex;
}

.menu li{
position:relative;
}

.menu a{
color:white;
text-decoration:none;
padding:14px 18px;
display:block;
font-size:14px;
}

.menu a:hover{
background:#163a5a;
}

/* Dropdown */

.dropdown{
position:absolute;
top:100%;
left:0;
background:white;
min-width:220px;
display:none;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.dropdown a{
color:black;
padding:10px 14px;
}

.has-dropdown:hover .dropdown{
display:block;
}

/* ================= FOOTER ================= */

.gov-footer{
background:linear-gradient(90deg,#1b4f72,#1f7a7a,#1b4f72);
color:white;
text-align:center;
padding:35px 20px;
margin-top:5px;
}

.footer-logos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.footer-logos img{
height:42px;
background:white;
border-radius:3px;
}

.footer-text{
font-size:13px;
line-height:1.8;
}

.footer-links a{
color:white;
margin:0 6px;
text-decoration:none;
}

.footer-links a:hover{
text-decoration:underline;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.menu-icon{
display:block;
}

.nav-bar{
display:none;
flex-direction:column;
}

.menu{
flex-direction:column;
}

.menu a{
border-top:1px solid rgba(255,255,255,0.2);
}

.has-dropdown:hover .dropdown{
display:none;
}

.dropdown{
position:static;
display:none;
}

.azadi-banner{
left:100px;
height:35px;
}

}

</style>

</head>

<body>

<!-- ================= LOADER ================= -->

<div id="page-loader">
<div class="loader-wrapper">
<img src="logo.png" class="loader-logo">
<span class="loader-ring"></span>
</div>
</div>

<!-- ================= HEADER ================= -->

<header>

<div class="top-strip">

<div class="header-left">
<img src="crs.png" class="crs-logo">

<div class="title-area">
<h1>Birth & Death Registration</h1>
<p>Office of the Registrar General & Census Commissioner, India</p>
<p>Ministry of Home Affairs</p>
</div>

<img src="azadi_logo_light-min.png" class="azadi-banner">

</div>

<div class="header-center">
<img src="emblem.png" class="emblem">
</div>

<div class="header-right">

<span class="tool">A-</span>
<span class="tool">A</span>
<span class="tool">A+</span>

<button class="login">Login</button>

<span class="menu-icon">☰</span>

</div>

</div>

</header>
<!-- ================= FOOTER ================= -->

<footer class="gov-footer">

<div class="footer-logos">

<img src="logo1.png">
<img src="logo2.png">
<img src="logo3.png">

</div>

<div class="footer-text">

© Civil Registration System

<div class="footer-links">

<a href="#">Privacy Policy</a> |
<a href="#">Terms</a> |
<a href="#">Contact</a>

</div>

</div>

</footer>

<!-- ================= SCRIPT ================= -->

<script>

/* Loader */

function hideLoader(){
const loader=document.getElementById("page-loader");
loader.classList.add("hide");
setTimeout(()=>loader.remove(),500);
}

window.addEventListener("load",()=>{

setTimeout(hideLoader,800);

});


/* Mobile menu */

document.querySelector(".menu-icon").onclick=function(){

const nav=document.querySelector(".nav-bar");

nav.style.display=nav.style.display==="flex"?"none":"flex";

};


/* Mobile dropdown */

document.querySelectorAll(".has-dropdown > a").forEach(menu=>{

menu.addEventListener("click",function(e){

if(window.innerWidth<768){

e.preventDefault();

const dropdown=this.nextElementSibling;

dropdown.style.display=dropdown.style.display==="block"?"none":"block";

}

});

});

</script>

</body>
</html>
